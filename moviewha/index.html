<style>
:root{--bg:#0b1020;--card:#151d2e;--card-h:#1a2338;--border:rgba(255,255,255,0.07);--border-s:rgba(255,255,255,0.14);--text:#f2f0ec;--muted:#6b7280;--dim:#2d3748;--gold:#ffc300;--gold-glow:rgba(255,195,0,0.12);--teal:#10b981;--red:#ef4444;--radius:10px;--font-ui:'Poppins',system-ui,sans-serif;--font-film:'Poppins',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-weight:300;line-height:1.6;min-height:100vh;padding-bottom:70px}
.site-header{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(11,16,32,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:50}
.header-logo{display:flex;align-items:center;height:36px}
.header-logo svg{height:100%;width:auto}
.header-right{text-align:right}
.tagline{display:block;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:2px;font-weight:500}
.site-date{font-size:0.75rem;color:var(--muted)}
main{max-width:1100px;margin:0 auto;padding:2rem 1.75rem 3rem}
.section-label{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:0.75rem}

/* Loading state */
.loading{display:flex;align-items:center;justify-content:center;min-height:400px;flex-direction:column;gap:1rem}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border-s);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-text{font-size:0.78rem;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}

/* Ad slots */
.ad-slot{width:100%;display:flex;flex-direction:column;align-items:center}
.ad-slot-inner{width:100%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.06);border-radius:var(--radius)}
.ad-label{font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;align-self:flex-start;padding-left:2px}
.ad-slot--mid{margin-bottom:2rem}
.ad-slot--mid .ad-slot-inner{height:90px;max-width:728px}
.ad-slot--bottom{margin-top:1.5rem}
.ad-slot--bottom .ad-slot-inner{height:250px;max-width:336px}
.ad-slot--sticky{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(11,16,32,0.97);border-top:1px solid var(--border-s);padding:6px 1rem;display:flex;align-items:center;justify-content:center}
.ad-slot--sticky .ad-slot-inner{height:50px;max-width:320px}
@media(min-width:768px){.ad-slot--sticky{display:none}}
.ad-placeholder{font-size:0.6rem;color:var(--dim)}

/* Hero */
.hero-wrap{animation:fadeUp 0.5s ease both;margin-bottom:2rem}
.hero{display:grid;grid-template-columns:320px 1fr;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)}
.hero-media{padding:1.25rem;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:stretch;gap:0.85rem}
.pick-head{display:flex;flex-direction:column;gap:0.35rem}
.pick-cat{font-size:1.02rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(242,240,236,0.9);font-weight:700;text-align:center;font-family:var(--font-ui)}
.pick-reason{font-size:0.82rem;line-height:1.7;color:rgba(242,240,236,0.68);text-align:center}
.poster-box{position:relative;border:2px solid var(--border);border-radius:0;overflow:hidden;background:#0a0f1f;display:inline-block;max-width:100%;line-height:0;vertical-align:top;align-self:center}
.poster-frame--hero{border-color:rgba(255,255,255,0.92)}
.poster-frame--released{border-color:rgba(16,185,129,0.9)}
.poster-frame--birthday{border-color:rgba(255,195,0,0.9)}
.poster-frame--awful{border-color:rgba(239,68,68,0.9)}
.poster-img{display:block;height:auto;max-width:100%;width:auto;background:#0a0f1f}
.poster-box--hero .poster-img{max-height:460px}
.poster-box--card .poster-img{max-height:340px}
.play-btn{position:absolute;bottom:10px;right:10px;z-index:3;width:40px;height:40px;border-radius:50%;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;color:#0b1020}
.play-btn:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(255,195,0,0.4)}
.play-btn.hidden{display:none}
.trailer-wrap{position:absolute;inset:0;z-index:10;background:#000;opacity:0;pointer-events:none;transition:opacity 0.3s}
.trailer-wrap.active{opacity:1;pointer-events:all}
.trailer-wrap iframe{width:100%;height:100%;border:none;display:block}
.trailer-close{position:absolute;top:8px;right:8px;z-index:11;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui)}
.hero-body{padding:2rem 2rem 1.5rem;display:flex;flex-direction:column}
.film-title{font-family:var(--font-ui);font-style:normal;font-weight:700;font-size:2.2rem;line-height:1.15;margin-bottom:0.2rem;letter-spacing:-0.01em}
.film-starring{font-size:0.7rem;color:var(--muted);margin-bottom:0.7rem}
.film-starring span{color:rgba(242,240,236,0.65)}
.film-meta{font-size:0.7rem;color:var(--muted);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.platform-pill{background:rgba(255,195,0,0.1);color:var(--gold);border:1px solid rgba(255,195,0,0.25);padding:2px 9px;border-radius:4px;font-size:0.62rem;font-weight:500}
.platform-pill{display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.platform-pill:hover{border-color:rgba(255,195,0,0.4);background:rgba(255,195,0,0.14)}
.platform-pill:focus{outline:2px solid rgba(255,195,0,0.35);outline-offset:2px}
.platform-pill[aria-disabled="true"]{cursor:default;opacity:0.85}
.ratings-row{display:flex;align-items:center;gap:7px;margin-bottom:1.25rem;flex-wrap:wrap}
.rating-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:500;padding:4px 9px;border-radius:5px;border:1px solid var(--border-s)}
.rating-badge.imdb-r{background:rgba(245,197,24,0.08);border-color:rgba(245,197,24,0.22)}
.rating-badge.rt-r{background:rgba(250,60,60,0.08);border-color:rgba(250,60,60,0.2)}
.rating-badge.mc-r{background:rgba(100,200,100,0.07);border-color:rgba(100,200,100,0.2)}
.r-label{font-size:0.58rem;font-weight:700}
.imdb-r .r-label{color:#f5c518}
.rt-score{color:#fa4040}
.mc-score{color:#64c864}
.r-dim{font-size:0.58rem;color:var(--muted)}
.film-blurb{font-size:0.86rem;line-height:1.9;color:rgba(242,240,236,0.7);flex:1;margin-bottom:1.5rem;font-weight:300}
.action-bar{display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);padding-top:1rem;flex-wrap:wrap}
.share-wrap{position:relative}
.share-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid var(--border-s);color:var(--text);border-radius:6px;padding:6px 12px;font-size:0.7rem;font-family:var(--font-ui);font-weight:500;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.share-btn:hover{background:rgba(255,255,255,0.09)}
.share-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:#1a2338;border:1px solid var(--border-s);border-radius:var(--radius);padding:6px;min-width:168px;opacity:0;visibility:hidden;transform:translateY(6px);transition:opacity 0.15s,transform 0.15s,visibility 0.15s;z-index:200}
.share-menu.open{opacity:1;visibility:visible;transform:translateY(0)}
.share-item{display:flex;align-items:center;gap:10px;width:100%;padding:7px 10px;font-size:0.75rem;color:var(--text);background:none;border:none;border-radius:6px;cursor:pointer;font-family:var(--font-ui);font-weight:300;text-decoration:none;transition:background 0.1s}
.share-item:hover{background:rgba(255,255,255,0.07)}
.share-item svg{opacity:0.6;flex-shrink:0}
.share-divider{border:none;border-top:1px solid var(--border);margin:4px 6px}
.copy-confirm{font-size:0.65rem;color:var(--teal);opacity:0;transition:opacity 0.2s;pointer-events:none}
.copy-confirm.show{opacity:1}
.ext-links{margin-left:auto;display:flex;gap:8px;align-items:center}
.badge-imdb{background:#f5c518;color:#000;font-weight:700;font-size:0.58rem;padding:4px 7px;border-radius:4px;text-decoration:none;display:inline-flex;align-items:center;font-family:var(--font-ui)}
.badge-lbd{display:inline-flex;align-items:center;opacity:0.7;transition:opacity 0.15s;text-decoration:none}
.badge-lbd:hover{opacity:1}

/* Grid cards */
.secondary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;animation:fadeUp 0.5s ease 0.2s both}
.card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card);display:flex;flex-direction:column;transition:border-color 0.2s,background 0.2s}
.card:hover{border-color:var(--border-s);background:var(--card-h)}
.card-stripe{height:3px}
.card--birthday .card-stripe{background:var(--gold)}
.card--released .card-stripe{background:var(--teal)}
.card--awful .card-stripe{background:var(--red)}
.card-media{padding:1rem;display:flex;flex-direction:column;align-items:center;gap:0.75rem}
.pick-head{width:100%}
.pick-cat--hero{color:rgba(255,255,255,0.92)}
.pick-cat--birthday{color:rgba(255,195,0,0.9)}
.pick-cat--released{color:rgba(16,185,129,0.9)}
.pick-cat--awful{color:rgba(239,68,68,0.9)}
.card-body{padding:1rem;flex:1;display:flex;flex-direction:column}
.card-title{font-family:var(--font-ui);font-style:normal;font-weight:700;font-size:1.05rem;margin-bottom:3px;line-height:1.3;color:var(--text)}
.card-meta{font-size:0.65rem;color:var(--muted);margin-bottom:0.5rem;font-weight:300}
.card-platforms{display:flex;gap:6px;flex-wrap:wrap;margin:-2px 0 0.65rem}
.card-ratings{display:flex;gap:5px;margin-bottom:0.6rem;flex-wrap:wrap}
.mini-r{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;padding:2px 7px;border-radius:4px;border:1px solid var(--border-s)}
.card-blurb{font-size:0.76rem;line-height:1.75;color:rgba(242,240,236,0.6);flex:1;margin-bottom:0.875rem;font-weight:300}
.card-actions{display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);padding-top:0.75rem;flex-wrap:wrap}

footer{text-align:center;padding:2rem 2rem 1rem;border-top:1px solid var(--border);font-size:0.7rem;color:var(--dim)}
footer a{color:var(--muted);text-decoration:none;transition:color 0.15s}
footer a:hover{color:var(--gold)}
.footer-brand{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:0.5rem}
.footer-links{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-top:0.5rem;flex-wrap:wrap}
.footer-links a{font-size:0.65rem}
.footer-omdb{font-size:0.58rem;color:var(--dim);margin-top:0.75rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){.hero{grid-template-columns:1fr}.hero-media{border-right:none;border-bottom:1px solid var(--border)}.poster-box--hero .poster-img{max-height:360px}.film-title{font-size:1.9rem}.hero-body{padding:1.25rem}main{padding:1.25rem 1rem 2rem}.site-header{padding:0.875rem 1.25rem}}
</style>

      <div class="hero-media">
        <div class="pick-head">
          <div class="pick-cat pick-cat--hero">Movie of the Day</div>
          <div class="pick-reason">${pickReason(p)}</div>
        </div>
        <div class="poster-box poster-box--hero poster-frame--hero">
          <div class="trailer-wrap" id="trailer-wrap">
            <button class="trailer-close" onclick="closeTrailer()">&times;</button>
            <iframe id="trailer-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
          </div>
          <img class="poster-img" src="${posterSrc(p)}" alt="${p.title} poster" loading="eager">
          ${playBtn}
        </div>
      </div>
      <div class="hero-body">
        <h1 class="film-title">${p.title}</h1>
        ${cast ? `<div class="film-starring">Starring <span>${cast}</span></div>` : ''}
        <div class="film-meta">${p.year} &nbsp;&middot;&nbsp; ${runtime}${p.genre} ${streaming}</div>
        ${ratingsHtml(p)}
        <p class="film-blurb">${p.blurb}</p>
        <div class="action-bar">
          ${shareMenu('hero', p.title, p.blurb.split('.')[0] + '.')}
          ${extLinks(p.imdb_id, p.tmdb_id, p.title)}
        </div>
      </div>
    </div>
  </div>`;
}

function buildCard(p, type) {
  const cast = p.cast ? p.cast.slice(0,2).join(', ') : '';
  const catLabel = type === 'released' ? 'Released Today' : (type === 'birthday' ? 'Happy Birthday' : (type === 'awful' ? 'Dumpster Dive' : ''));
  const catClass = type === 'released' ? 'pick-cat--released' : (type === 'birthday' ? 'pick-cat--birthday' : (type === 'awful' ? 'pick-cat--awful' : ''));
  const streaming = p.streaming && p.streaming.length ? p.streaming.map(s => {
    if (p.watch_url) return `<a class="platform-pill" href="${p.watch_url}" target="_blank" rel="noopener">${s}</a>`;
    return `<span class="platform-pill" aria-disabled="true">${s}</span>`;
  }).join('') : '';
  return `
  <div class="card card--${type}">
    <div class="card-stripe"></div>
    <div class="card-media">
      <div class="pick-head">
        <div class="pick-cat ${catClass}">${catLabel}</div>
        <div class="pick-reason">${pickReason(p)}</div>
      </div>
      <div class="poster-box poster-box--card ${type === 'released' ? 'poster-frame--released' : (type === 'birthday' ? 'poster-frame--birthday' : (type === 'awful' ? 'poster-frame--awful' : 'poster-frame--hero'))}">
        <img class="poster-img" src="${posterSrc(p)}" alt="${p.title} poster" loading="lazy">
      </div>
    </div>
    <div class="card-body">
      <div class="card-title">${p.title}</div>
      <div class="card-meta">${p.year}${cast ? ' &middot; ' + cast : ''}</div>
      ${streaming ? `<div class="card-platforms">${streaming}</div>` : ''}
      ${miniRatings(p)}
      <div class="card-blurb">${p.blurb}</div>
      <div class="card-actions">
        ${shareMenu(type, p.title, p.blurb.split('.')[0] + '.')}
        ${extLinks(p.imdb_id, p.tmdb_id, p.title)}
      </div>
    </div>
  </div>`;
}

// ── Main render ──────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/moviewha/today.json');
    const d = await res.json();

    if (!d.hero) throw new Error('No data');

    document.getElementById('site-date').textContent = d.date || '';
    document.title = 'MovieWha? — ' + (d.hero.title || 'What to watch tonight');

    const main = document.getElementById('main-content');
    main.innerHTML = `
      ${buildHero(d.hero, d)}

      <div class="ad-slot ad-slot--mid" aria-label="Advertisement">
        <div class="ad-label">Advertisement</div>
        <div class="ad-slot-inner"><span class="ad-placeholder">Ad · 728×90</span></div>
      </div>

      <div class="secondary-grid">
        ${buildCard(d.released, 'released')}
        ${buildCard(d.birthday, 'birthday')}
        ${buildCard(d.awful, 'awful')}
      </div>

      <div class="ad-slot ad-slot--bottom" aria-label="Advertisement">
        <div class="ad-label">Advertisement</div>
        <div class="ad-slot-inner"><span class="ad-placeholder">Ad · 336×250</span></div>
      </div>
    `;

  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div class="loading">
        <div class="loading-text" style="color:var(--muted)">Today's picks are being prepared. Check back soon.</div>
      </div>`;
  }
}

// ── Interactions ─────────────────────────────────────
function openTrailer(k) {
  const w = document.getElementById('trailer-wrap');
  document.getElementById('trailer-iframe').src = 'https://www.youtube.com/embed/' + k + '?autoplay=1&rel=0';
  w.classList.add('active');
}
function closeTrailer() {
  document.getElementById('trailer-wrap').classList.remove('active');
  document.getElementById('trailer-iframe').src = '';
}
function toggleShare(id) {
  const all = document.querySelectorAll('.share-menu');
  const t = document.getElementById('menu-' + id);
  all.forEach(m => { if (m !== t) m.classList.remove('open'); });
  if (t) t.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.share-wrap')) document.querySelectorAll('.share-menu').forEach(m => m.classList.remove('open'));
});
function doCopy(title, line, cid) {
  const text = 'Today\u2019s MovieWha: ' + title + ' \u2014 ' + line + ' ' + SITE_URL;
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById(cid);
    if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
    document.querySelectorAll('.share-menu').forEach(m => m.classList.remove('open'));
  });
}

init();
</script>
</body>
</html>
