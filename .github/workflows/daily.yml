name: Daily MovieWha Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  generate-daily-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's picks
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: node scripts/generate.js

      - name: Commit and push today.json
        run: |
          git config user.name "MovieWha Bot"
          git config user.email "bot@dailywha.com"
          git add moviewha/today.json
          git diff --staged --quiet || git commit -m "Daily picks: $(date +'%Y-%m-%d')"
          git push
